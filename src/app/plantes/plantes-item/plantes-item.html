<div class="card h-100 shadow-sm border-0">
  <div class="d-flex align-items-center justify-content-center bg-light"
       style="height: 180px;">
    <img
      src="{{ planta().foto }}"
      alt="{{ planta().nom }}"
      class="img-fluid"
      style="max-height: 160px; object-fit: contain;"
    >
  </div>

  <div class="card-body d-flex flex-column">
    <h5 class="card-title fw-semibold text-center">
      {{ planta().nom }} <span (click)="toggleFavorite()">{{ planta().favorite ? '❤️' : '🤍' }}</span>
    </h5>

    <p class="card-text text-muted text-center small">
      <span class="fw-bold">{{ planta().capacitat }} kW</span>
    </p>

    <p class="card-text text-muted text-center small">
      <span class="fw-bold">{{ planta().ubicacio.latitude }}</span>,
      <span class="fw-bold">{{ planta().ubicacio.longitude }}</span>
    </p>

    <div class="mt-auto text-center">
      <a
        class="btn btn-outline-primary btn-sm w-100"
        href="#planta/{{ planta().id }}">
        Veure detall
      </a>
    </div>
  </div>
</div>
