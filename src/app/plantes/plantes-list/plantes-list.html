  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    @for (planta of plantes(); track planta.id) {
      <div class="col">
        <app-plantes-item [plantaAlias]="planta" (favoriteToggled)="toggleFavorite(planta)"></app-plantes-item>
      </div>
    }
  </div>
  <!-- {{ plantes() | json }} -->
</div>
