<div class="container py-4">
  <table class="table table-dark table-borderless">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Capacitat (kW)</th>
        <th>Usuari</th>
        <th>Latitud</th>
        <th>Longitud</th>
      </tr>
    </thead>
    <tbody>
      @for(planta of plantes(); track planta.id) {
        <tr app-plantes-tables-row [plantaAlias]="planta"></tr>
      }
    </tbody>
  </table>
</div>
